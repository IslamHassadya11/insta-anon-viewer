<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaAnon Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .story-ring { border: 4px solid #f472b6; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 50; }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-10 flex items-center justify-center gap-4">
      <i class="fa-brands fa-instagram text-pink-500"></i> InstaAnon
    </h1>

    <div class="flex gap-4 max-w-xl mx-auto mb-12">
      <input id="username" type="text" placeholder="Enter username (e.g. natgeo)" 
             class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-pink-500">
      <button onclick="loadProfile()" 
              class="bg-gradient-to-r from-pink-500 to-purple-600 px-10 rounded-2xl font-semibold text-lg">Search</button>
    </div>

    <div id="error" class="hidden text-red-400 text-center text-xl mb-8"></div>
    <div id="profile" class="hidden bg-gray-900 rounded-3xl p-10"></div>
  </div>

  <div id="modal" class="modal" onclick="if(event.target===this)this.style.display='none'">
    <img id="modal-img" class="max-h-[92vh] max-w-[92vw] rounded-3xl" onclick="event.stopImmediatePropagation()">
  </div>

  <script>
    const proxies = ["https://corsproxy.io/?", "https://api.allorigins.win/raw?url="];

    async function fetchWithProxy(url) {
      for (let proxy of proxies) {
        try {
          const res = await fetch(proxy + encodeURIComponent(url), {
            headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)' }
          });
          if (res.ok) return await res.json();
        } catch(e) {}
      }
      return null;
    }

    async function loadProfile() {
      let username = document.getElementById('username').value.trim().toLowerCase();
      if (!username) return alert("Enter a username");

      const errorDiv = document.getElementById('error');
      const profileDiv = document.getElementById('profile');
      errorDiv.classList.add('hidden');
      profileDiv.innerHTML = `<p class="text-center py-20 text-gray-400">Loading...</p>`;
      profileDiv.classList.remove('hidden');

      const data = await fetchWithProxy(`https://www.instagram.com/api/v1/users/web_profile_info/?username=${username}`);

      if (!data?.data?.user) {
        errorDiv.innerHTML = `❌ Failed to load profile.<br><br>Try these public accounts:<br><b>natgeo</b>, <b>cristiano</b>, <b>therock</b>, <b>instagram</b>`;
        errorDiv.classList.remove('hidden');
        profileDiv.classList.add('hidden');
        return;
      }

      const user = data.data.user;
      let posts = user.edge_owner_to_timeline_media?.edges || [];

      let postsHTML = posts.slice(0,9).map(p => {
        const img = p.node.thumbnail_src || p.node.display_url;
        return `<img onclick="enlarge('${img}')" src="${img}" class="w-full aspect-square object-cover rounded-2xl cursor-pointer hover:scale-105 transition">`;
      }).join('') || '<p class="col-span-3 text-center py-10 text-gray-400">No posts visible</p>';

      profileDiv.innerHTML = `
        <div class="flex flex-col md:flex-row gap-10 items-center md:items-start">
          <div onclick="enlarge('${user.profile_pic_url_hd || user.profile_pic_url}')" class="cursor-pointer">
            <img src="${user.profile_pic_url_hd || user.profile_pic_url}" class="w-56 h-56 rounded-full border-4 border-pink-500 story-ring">
          </div>
          <div class="flex-1 text-center md:text-left">
            <h2 class="text-4xl font-bold">${user.full_name} <span class="text-gray-400">@${user.username}</span></h2>
            <p class="mt-5 text-lg">${user.biography || 'No biography'}</p>
            <div class="flex justify-center md:justify-start gap-8 mt-8 text-xl">
              <div><b>${user.edge_followed_by.count.toLocaleString()}</b> followers</div>
              <div><b>${user.edge_follow.count.toLocaleString()}</b> following</div>
              <div><b>${user.edge_owner_to_timeline_media.count.toLocaleString()}</b> posts</div>
            </div>
          </div>
        </div>

        <h3 class="mt-14 mb-6 text-3xl font-semibold">Recent Posts</h3>
        <div class="grid grid-cols-3 gap-4">${postsHTML}</div>

        <p class="text-center text-gray-500 mt-12">Stories & recent follows not supported in browser version (Instagram blocks them).</p>
      `;
    }

    function enlarge(src) {
      document.getElementById('modal-img').src = src;
      document.getElementById('modal').style.display = 'flex';
    }

    document.getElementById('username').addEventListener('keypress', e => {
      if (e.key === 'Enter') loadProfile();
    });
  </script>
</body>
</html>
